# Reusable text snippets for DCAS rules and recommendations
# All tags are prefixed with * to avoid accidental matches with real words

[snippets."DAS, README issues"]
"*cite_data" = "Add data citations in the README as well as the manuscript for each dataset you use, whether you include it in the package or not. Citing data sources in the manuscript is the best way of directing readers to them. Please see here (https://social-science-data-editors.github.io/guidance/addtl-data-citation-guidance.html) for examples and further guidance."
"*DAS" = "Include a formal Data Availability Statement for each of the datasets you are using. The goal is to describe clearly the steps that readers have to take if they want to access the data. Please see here (https://social-science-data-editors.github.io/template_README/) for examples and further guidance. In particular, the Data and Code Availability Statement \"contains information about the sources of data used in the replication package, in addition to or instead of such detailed description in the manuscript. A DCAS goes beyond a typical data citation, as it describes additional information necessary for the obtention of the data. These may include required registrations, memberships, application procedures, monetary cost, or other qualifications, beyond a simple URL for download which is typically part of Data Citations.\""
"*major" = "We appreciate your effort in producing the replication package, however, in order for me to accept it, it needs to adhere to our policy of following the DCAS, which you can find here https://datacodestandard.org/. The best approach is to follow the template README provided by the Social Science Data Editors here: https://social-science-data-editors.github.io/template_README/."
"*readme" = "Please note that we only accept a README file in plain text, markdown or PDF for easier access to its text. See here (https://social-science-data-editors.github.io/template_README/) for examples and further guidance."
"*instructions" = "Please specify instructions for the replicator. From the template README (https://social-science-data-editors.github.io/template_README/): The README should specify the instructions allowing a replicator to produce the same results. This should include separately instructions for data preparation and for analysis. A good replication package uses a minimal number of automated scripts, with no manual interventions required unless absolutely unavoidable. Ideally, one master script could be the only executable needed to run the entire replication, although we don't strictly enforce this as a requirement."
"*IPUMS" = "The social science data editor web site (https://social-science-data-editors.github.io/guidance/Guidance/Requested_information_dcas.html#ipums) recommends using the following statement `The paper uses data obtained from IPUMS (Ruggles et al, 2017). IPUMS-CPS does not currently provide the ability to store or reference custom extracts, but allows for redistribution for the purpose of replication. The archive contains the extracted data, codebook in the folder \"data/IPUMS\". The data citation in the main article has the full URL.' Please include the codebook in an appropriate folder if you haven't done so. See also https://usa.ipums.org/usa/cite.shtml where you can find the DOI of the IPUMS data you used. You should report the exact DOI to ensure proper replicability, since dataset may change from time to time."

[snippets."Code issues"]
"*macosx" = "Please remove the folder(s) .__MACOSX or .DS_STORE from the .zip file. These are metadata folders created by macOS that are not needed for replication."
"*relative_path" = "Replace absolute paths in the scripts with relative paths. Let readers know which folder to run your code from and use paths relative to that."
"*stata_packages" = "Please add to the README all Stata package that you use with instructions on how to install them. We recommend including external commands code with your distribution to ensure future replicability (external packages may disappear, or may change. Ideally, you would do the following: (a) find where your external commands are stored by Stata by typing 'adopath' and/or 'which [packagename]'. (b) Then, copy those external command files to a subdirectory of your replication package and type 'adopath ++ [path]' to add the package's (relative) path where you stored the packages. Stata will search for packages from that directory first."
"*matlab_toolboxes" = "Mention all Matlab toolboxes that you use in the README."
"*fortran" = "Describe in the README how the Fortran code can be compiled and what other libraries are needed."
"*save_output" = "Save all the output of the analysis in some standard format into the replication package. Tables can be saved as .csv, .xls or .tex files. It is also sufficient to save the Stata .log file. In this case, please report in the README the line numbers where the readers can find the table numbers. Figures can be saved in .eps, .pdf or .png."
"*forward_slash" = "Use \"/\" rather than \"\\\" in file names. The former works on all three major platforms, the latter only on Windows."
"*data_manipulation" = "Please include all data manipulation code you used in creating the analysis dataframe."
"*synthetic" = "When including synthetic data, please provide the entire pipeline: synthetic data -> intermediate synthetic data -> final synthetic output for us to check. In a separate tree of the package provide the steps that do not require convidential data:  intermediate (distributable) data -> final output. This will help us verify the code without needing access to confidential data. The easiest way should be to have two separate archives, synthetic.zip, that runs the entire process, and real.zip that includes only the data that you can share. Make sure real.zip contains a subdirectory of restricted_raw_data where someone with data access should place the data. Describe this in the README file, specifying which steps can be run in the 'real' archive without confidential data.  You could, for example, provide two master scripts, one executing the code requiring confidential data, and the other executing intermediate steps and results. "
[snippets."Data issues"]
"*include_data" = "If the license permits, include raw data in the replication package. URLs to data websites may change and future readers may not be able to easily find the datasets you use."
"*instruments" = "Please include all experiment or survey documentation in the package. This applies to experimental instructions, a human readable version of the survey, and the explanation in the README about the sample selection and the data collection process. See Rule 10 in https://datacodestandard.org/"
"*confidential_data" = "I understand some of your data is confidential. This does not lead to automatic exemption from the Data Availability Policy. The first step in this case here is to ask you if you received permission from the data providers to share the data with journal data editors for replication purposes, or if you can ask it now. If you could, it would speed up the process considerably. We could agree to the following: - The data will be used solely for verification of your published results. - The data will not be retained, reused, or redistributed. - We never publish any of the materials you provide to us. - The data will be deleted once our process is complete. - We will confirm deletion by email. If this is not possible, I can try to get the data myself, but please let me know if this is feasible in reasonable time, and what are the costs of obtaining the data (which you will have to indicate in a revised README, if you haven't done so)."
"*requirements" = "Please describe the computational requirements for running your package, including software used and their dependencies, such as external packages that must be installed to run the code. See https://social-science-data-editors.github.io/template_README/template-README.html#computational-requirements for explanation and examples."
"*tresorit_upload" = "We appreciate if you can share your confidential/proprietary data with us for replication purposes. Please use the following link for sharing the files (tresorit data upload link)."
